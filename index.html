<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deprecata — Turma Regional · Mato Grosso do Sul</title>
<meta name="description" content="Deprecata — gestor local de cartas, encaminhamentos, contatos e procedimentos da Turma Regional de MS.">
<meta name="application-name" content="Deprecata">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bordo:#6b1f2a; --bordo-esc:#4a141d; --bordo-clr:#8a3340;
  --papel:#f6f2eb; --papel-2:#efe9df; --carta:#fffdf9;
  --tinta:#211c19; --tinta-2:#5b524a; --tinta-3:#8a8076;
  --linha:#e3dccf; --linha-2:#d6cdbd;
  --ouro:#a8842c; --ouro-clr:#c9a64a;
  --verm:#b42318; --verm-bg:#fdecea;
  --ambar:#b45309; --ambar-bg:#fdf3e3;
  --verde:#15803d; --verde-bg:#e9f5ec;
  --azul:#1d4e89; --azul-bg:#e8eef6;
  --neutro:#6b6258; --neutro-bg:#efeae1;
  --som:0 1px 2px rgba(33,28,25,.06),0 1px 3px rgba(33,28,25,.05);
  --som-2:0 4px 14px rgba(33,28,25,.10);
  --som-3:0 18px 50px rgba(33,28,25,.22);
  --r:12px; --r-sm:8px; --r-lg:18px;
  --serif:'Spectral',Georgia,'Times New Roman',serif;
  --sans:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:var(--sans);color:var(--tinta);background:var(--papel);
  line-height:1.5;font-size:14.5px;-webkit-font-smoothing:antialiased;
  background-image:radial-gradient(circle at 1px 1px,rgba(33,28,25,.018) 1px,transparent 0);
  background-size:22px 22px;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}
a{color:var(--bordo);text-decoration:none}
::selection{background:rgba(168,132,44,.25)}

/* ====== LAYOUT ====== */
.app{display:flex;flex-direction:column;min-height:100vh}
/* ===== HEADER + NAV ===== */
.topbar{
  position:sticky;top:0;z-index:30;
  background:linear-gradient(100deg,var(--bordo-esc),var(--bordo) 55%,#5c1a25);
  color:#f4e9da;border-bottom:1px solid rgba(0,0,0,.25);box-shadow:0 1px 10px rgba(33,28,25,.12);
  display:flex;align-items:center;gap:16px;padding:10px 24px;flex-wrap:nowrap;
}
.brand-h{display:flex;align-items:center;gap:11px;flex:none}
.seal-mark{
  width:42px;height:42px;border-radius:50%;flex:none;display:grid;place-items:center;
  background:radial-gradient(circle at 35% 30%,#9a3a47,#5c1a25);
  border:2px solid var(--ouro-clr);box-shadow:inset 0 0 0 3px rgba(0,0,0,.18),0 2px 6px rgba(0,0,0,.3);
  font-family:var(--serif);font-weight:700;font-size:12px;letter-spacing:.5px;color:#f4e3c4;line-height:1;text-align:center;
}
.brand-txt .eyebrow{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:#e6c98f;opacity:.92}
.brand-txt .name{font-family:var(--serif);font-size:20px;font-weight:700;line-height:1;margin-top:2px;letter-spacing:.3px}
nav.tabs{display:flex;align-items:center;gap:2px;overflow-x:auto;flex-wrap:nowrap;scrollbar-width:none}
nav.tabs::-webkit-scrollbar{display:none}
.tab{
  display:inline-flex;align-items:center;gap:8px;padding:8px 13px;border-radius:var(--r-sm);
  color:#ecdcc8;font-size:13px;font-weight:500;white-space:nowrap;
  transition:background .15s,color .15s;position:relative;
}
.tab .ic{width:16px;height:16px;flex:none;opacity:.9}
.tab .badge{background:rgba(0,0,0,.30);color:#ffd9a8;font-size:10.5px;font-weight:700;
  padding:1px 6px;border-radius:20px;min-width:18px;text-align:center}
.tab:hover{background:rgba(255,255,255,.09);color:#fff}
.tab.on{background:rgba(255,255,255,.15);color:#fff;font-weight:600}
.tab.on::after{content:"";position:absolute;left:13px;right:13px;bottom:-9px;height:3px;border-radius:3px 3px 0 0;background:var(--ouro-clr)}
.topbar .spacer{flex:1 1 auto}
.btn.nova{background:#f6e9cf;color:var(--bordo-esc);border-color:var(--ouro-clr);box-shadow:0 1px 4px rgba(0,0,0,.18)}
.btn.nova:hover{background:#fff4df}

/* ===== SUBBAR (contexto) ===== */
.subbar{position:sticky;top:62px;z-index:20;background:rgba(246,242,235,.9);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--linha);padding:11px 30px;display:flex;align-items:baseline;gap:12px}
.subbar h1{font-family:var(--serif);font-size:19px;font-weight:600;letter-spacing:.2px}
.subbar .sub{font-size:12px;color:var(--tinta-2)}

.content{padding:24px 30px 60px;max-width:1320px;width:100%;margin:0 auto}
.view{display:none;animation:fade .35s ease}
.view.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ====== BOTÕES ====== */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:var(--r-sm);
  font-size:13px;font-weight:600;background:var(--carta);border:1px solid var(--linha-2);box-shadow:var(--som);
  color:var(--tinta);transition:.15s;white-space:nowrap}
.btn:hover{border-color:var(--tinta-3);box-shadow:var(--som-2);transform:translateY(-1px)}
.btn .ic{width:15px;height:15px}
.btn.primary{background:var(--bordo);color:#fff;border-color:var(--bordo-esc)}
.btn.primary:hover{background:var(--bordo-clr)}
.btn.ghost{background:transparent;box-shadow:none;border-color:transparent}
.btn.ghost:hover{background:var(--papel-2);box-shadow:none}
.btn.sm{padding:6px 11px;font-size:12px}
.btn.danger{color:var(--verm);border-color:#f0c9c4}
.btn.danger:hover{background:var(--verm-bg)}
.iconbtn{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;color:var(--tinta-2);
  border:1px solid transparent;transition:.15s}
.iconbtn:hover{background:var(--papel-2);color:var(--tinta);border-color:var(--linha)}
.iconbtn.danger:hover{background:var(--verm-bg);color:var(--verm)}
.iconbtn.ok{color:var(--verde)} .iconbtn.ok:hover{background:var(--verde-bg);color:var(--verde)}
.iconbtn .ic{width:17px;height:17px}

/* ====== CARTÕES INDICADORES ====== */
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:24px}
.kpi{background:var(--carta);border:1px solid var(--linha);border-radius:var(--r);padding:16px 16px 15px;
  box-shadow:var(--som);position:relative;overflow:hidden;cursor:pointer;transition:.18s}
.kpi:hover{box-shadow:var(--som-2);transform:translateY(-2px)}
.kpi::after{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--linha-2)}
.kpi.tram::after{background:var(--azul)} .kpi.venc::after{background:var(--verm)}
.kpi.vir::after{background:var(--ambar)} .kpi.cump::after{background:var(--verde)}
.kpi.dev::after{background:var(--ouro)}
.kpi.cob::after{background:var(--bordo)}
.kpi.cob .num{color:var(--bordo)}
.kpi .lab{font-size:11.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--tinta-3);display:flex;align-items:center;gap:6px}
.kpi .num{font-family:var(--serif);font-size:38px;font-weight:600;line-height:1;margin:9px 0 3px}
.kpi .hint{font-size:11.5px;color:var(--tinta-2)}
.kpi.venc .num{color:var(--verm)} .kpi.dev .num{color:var(--ouro)}

/* ====== CARDS GERAIS ====== */
.card{background:var(--carta);border:1px solid var(--linha);border-radius:var(--r);box-shadow:var(--som)}
.card-h{padding:15px 18px;border-bottom:1px solid var(--linha);display:flex;align-items:center;gap:10px}
.card-h h2{font-family:var(--serif);font-size:16.5px;font-weight:600}
.card-h .ic{width:18px;height:18px;color:var(--bordo)}
.card-h .sub{font-size:12px;color:var(--tinta-2);margin-left:auto}
.card-b{padding:18px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
/* faixa compacta de vias de protocolo */
.via-strip{display:flex;gap:12px;flex-wrap:wrap}
.via-mini{flex:1 1 0;min-width:200px;display:flex;align-items:center;gap:11px;
  background:var(--carta);border:1px solid var(--linha);border-radius:var(--r);padding:11px 14px;box-shadow:var(--som)}
.via-ic{width:34px;height:34px;flex:none;border-radius:9px;background:var(--papel-2);display:grid;place-items:center;color:var(--bordo)}
.via-ic .ic{width:18px;height:18px}
.via-txt{min-width:0;flex:1}
.via-t{font-weight:700;font-size:13.5px;line-height:1.2}
.via-s{font-size:11px;color:var(--tinta-2);margin-top:1px}
.via-n{font-family:var(--serif);font-size:24px;font-weight:600;color:var(--bordo);flex:none}
.section-title{font-family:var(--serif);font-size:15px;font-weight:600;color:var(--tinta);margin:0 0 12px;
  display:flex;align-items:center;gap:8px}
.section-title .ic{width:16px;height:16px;color:var(--bordo)}

/* ====== BARRA DE FERRAMENTAS ====== */
.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:18px}
.search{position:relative;flex:1;min-width:220px}
.search .ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--tinta-3)}
.search input{width:100%;padding:10px 12px 10px 36px;border:1px solid var(--linha-2);border-radius:var(--r-sm);
  background:var(--carta);box-shadow:var(--som)}
.search input:focus{outline:none;border-color:var(--bordo-clr);box-shadow:0 0 0 3px rgba(107,31,42,.10)}
select.filt,input.filt{padding:9px 12px;border:1px solid var(--linha-2);border-radius:var(--r-sm);
  background:var(--carta);box-shadow:var(--som);font-size:13px;font-weight:500;color:var(--tinta-2)}
select.filt:focus,input.filt:focus{outline:none;border-color:var(--bordo-clr)}

/* ====== TABELA ====== */
.tbl-wrap{background:var(--carta);border:1px solid var(--linha);border-radius:var(--r);box-shadow:var(--som);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:left;padding:11px 14px;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;
  color:var(--tinta-3);font-weight:600;background:var(--papel-2);border-bottom:1px solid var(--linha)}
tbody tr{border-bottom:1px solid var(--linha);transition:background .12s;cursor:pointer}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#fbf7f0}
td{padding:12px 14px;vertical-align:top}
.cnj{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--tinta)}
.sub-cell{font-size:11.5px;color:var(--tinta-2);margin-top:3px}
.act-cell{display:flex;gap:4px;justify-content:flex-end;align-items:center}
.combtn{display:inline-flex;align-items:center;gap:6px;font-family:inherit;font-size:11.5px;font-weight:600;cursor:pointer;
  padding:6px 11px;border-radius:8px;color:var(--bordo);background:#f6e7e6;border:1px solid #ecccc9;white-space:nowrap;transition:.15s}
.combtn:hover{background:var(--bordo);color:#fff;border-color:var(--bordo-esc)}
.combtn .ic{width:15px;height:15px}

/* ---- Via pill (1ª coluna) ---- */
.viapill{display:inline-flex;align-items:stretch;margin-top:7px;border-radius:7px;overflow:hidden;cursor:pointer;
  border:1px solid var(--linha);font-size:10px;font-weight:700;letter-spacing:.02em;line-height:1;user-select:none;transition:.15s}
.viapill:hover{border-color:var(--tinta-3);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.viapill .vp-k{display:flex;align-items:center;padding:4px 7px;color:var(--tinta-2);background:var(--papel-2);white-space:nowrap}
.viapill .vp-s{display:flex;align-items:center;padding:4px 7px;white-space:nowrap}
.vp-s.amb{color:var(--ambar);background:var(--ambar-bg)}
.vp-s.ok{color:var(--verde);background:var(--verde-bg)}
.vp-s.azul{color:var(--azul);background:var(--azul-bg)}
.vp-s.neu{color:var(--neutro);background:var(--neutro-bg)}

/* ====== PILLS / SELOS ====== */
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;
  font-weight:600;white-space:nowrap;border:1px solid transparent}
.pill .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.pill.st-aguardando{color:#6b5e2a;background:#f6f0d8;border-color:#e8dcab}
.pill.st-cumprimento{color:var(--azul);background:var(--azul-bg);border-color:#cad9ee}
.pill.st-cumprida{color:var(--verde);background:var(--verde-bg);border-color:#c6e3cd}
.pill.st-devolvida{color:#3f5a8f;background:#eaeef7;border-color:#cdd7ec}
.pill.st-suspensa{color:var(--neutro);background:var(--neutro-bg);border-color:#ddd4c6}
.pill.st-arquivada{color:#6b6258;background:#eceae4;border-color:#dcd6c9}
.selo{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:7px;font-size:11px;font-weight:600;border:1px solid transparent}
.selo.venc{color:var(--verm);background:var(--verm-bg);border-color:#f3cfca}
.selo.hoje{color:#fff;background:var(--verm);border-color:var(--verm)}
.selo.amb{color:var(--ambar);background:var(--ambar-bg);border-color:#f1d9b3}
.selo.ok{color:var(--verde);background:var(--verde-bg);border-color:#cbe7d2}
.selo.neu{color:var(--neutro);background:var(--neutro-bg);border-color:#ded5c7}
.natureza{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 7px;border-radius:6px}
.natureza.publica{color:#7a4a12;background:#fbeed7;border:1px solid #efd9ac}
.natureza.mp{color:#5a2e7a;background:#f1e6f7;border:1px solid #ddc6ec}
.natureza.privada{color:var(--tinta-3);background:transparent}
.tag-div{font-size:10.5px;font-weight:700;letter-spacing:.04em;padding:2px 6px;border-radius:5px}
.tag-div.DKMS{color:var(--bordo);background:#f6e7e6;border:1px solid #ecccc9}
.tag-div.DJMS{color:var(--azul);background:var(--azul-bg);border:1px solid #cdd9ee}
.obst-flag{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:600;color:#8a4b00;
  background:#fbe8d4;border:1px solid #f0d4a8;padding:1px 6px;border-radius:5px;margin-top:4px}

/* ====== ESTADO VAZIO ====== */
.empty{text-align:center;padding:54px 24px;color:var(--tinta-2)}
.empty .em-mark{width:58px;height:58px;border-radius:50%;margin:0 auto 16px;display:grid;place-items:center;
  background:var(--papel-2);color:var(--bordo)}
.empty h3{font-family:var(--serif);font-size:19px;color:var(--tinta);margin-bottom:6px}
.empty p{font-size:13px;max-width:380px;margin:0 auto 18px}
.empty .actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

/* ====== MODAL ====== */
.scrim{position:fixed;inset:0;background:rgba(33,28,25,.42);backdrop-filter:blur(2px);z-index:60;
  display:none;align-items:flex-start;justify-content:center;padding:40px 18px;overflow:auto}
.scrim.on{display:flex}
.modal{background:var(--papel);border-radius:var(--r-lg);box-shadow:var(--som-3);width:100%;max-width:760px;
  border:1px solid var(--linha);animation:pop .22s ease}
.modal.wide{max-width:920px}
@keyframes pop{from{opacity:0;transform:scale(.97) translateY(8px)}to{opacity:1;transform:none}}
.modal-h{padding:18px 22px;border-bottom:1px solid var(--linha);display:flex;align-items:center;gap:12px;
  position:sticky;top:0;background:var(--papel);border-radius:var(--r-lg) var(--r-lg) 0 0;z-index:2}
.modal-h h2{font-family:var(--serif);font-size:19px;font-weight:600;flex:1}
.modal-h .ic{width:20px;height:20px;color:var(--bordo)}
.modal-b{padding:22px}
.modal-f{padding:16px 22px;border-top:1px solid var(--linha);display:flex;gap:10px;align-items:center;
  position:sticky;bottom:0;background:var(--papel);border-radius:0 0 var(--r-lg) var(--r-lg)}
.modal-f .spacer{flex:1}

/* ====== FORM ====== */
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--tinta-2);margin-bottom:5px}
.field label .req{color:var(--verm)}
.field label .hint-inline{font-weight:400;color:var(--tinta-3);font-size:11px;text-transform:none;letter-spacing:0}
.field input,.field select,.field textarea{width:100%;padding:9px 11px;border:1px solid var(--linha-2);
  border-radius:var(--r-sm);background:var(--carta);transition:.15s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--bordo-clr);box-shadow:0 0 0 3px rgba(107,31,42,.09)}
.field textarea{resize:vertical;min-height:64px}
.field input.mono{font-family:var(--mono);letter-spacing:.3px}
.field.err input,.field.err select{border-color:var(--verm);background:var(--verm-bg)}
.field .help{font-size:11px;color:var(--tinta-3);margin-top:4px}
.field .help.calc{color:var(--verde);font-weight:600}
.row{display:grid;gap:14px}
.row.c2{grid-template-columns:1fr 1fr}
.row.c3{grid-template-columns:1fr 1fr 1fr}
.fieldset{border:1px solid var(--linha);border-radius:var(--r);padding:15px;margin-bottom:16px;background:#fffefb}
.fieldset legend{font-family:var(--serif);font-size:13.5px;font-weight:600;padding:0 8px;color:var(--bordo)}
.seg{display:inline-flex;background:var(--papel-2);border-radius:8px;padding:3px;gap:3px;border:1px solid var(--linha)}
.seg button{padding:6px 12px;border-radius:6px;font-size:12.5px;font-weight:600;color:var(--tinta-2)}
.seg button.on{background:var(--carta);color:var(--bordo);box-shadow:var(--som)}
.switch{display:inline-flex;align-items:center;gap:9px;cursor:pointer;font-size:13px;font-weight:500}
.switch input{display:none}
.switch .track{width:38px;height:22px;border-radius:20px;background:var(--linha-2);position:relative;transition:.2s;flex:none}
.switch .track::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:var(--som);transition:.2s}
.switch input:checked+.track{background:var(--bordo)}
.switch input:checked+.track::after{transform:translateX(16px)}
.chk{display:flex;align-items:center;gap:9px;padding:9px 11px;border:1px solid var(--linha);border-radius:var(--r-sm);
  background:var(--carta);font-size:13px;cursor:pointer;transition:.15s;margin-bottom:7px}
.chk:hover{border-color:var(--tinta-3)}
.chk input{width:17px;height:17px;accent-color:var(--bordo);flex:none}
.chk.done{background:var(--verde-bg);border-color:#cbe7d2}

/* ====== DROPZONE ====== */
.dropz{border:2px dashed var(--linha-2);border-radius:var(--r);padding:18px;text-align:center;
  background:var(--papel-2);transition:.18s;margin-bottom:16px;cursor:pointer}
.dropz.drag{border-color:var(--bordo);background:#f6ece9}
.dropz .ic{width:26px;height:26px;color:var(--bordo);margin-bottom:6px}
.dropz .t{font-size:13px;font-weight:600}
.dropz .s{font-size:11.5px;color:var(--tinta-2);margin-top:2px}
.dropz .status{margin-top:9px;font-size:12px;font-weight:600;display:none}
.dropz .status.show{display:block}
.dropz .status.ok{color:var(--verde)} .dropz .status.err{color:var(--verm)} .dropz .status.busy{color:var(--azul)}

/* ====== BANNERS / AVISOS ====== */
.banner{display:flex;gap:11px;align-items:flex-start;padding:12px 14px;border-radius:var(--r-sm);
  font-size:12.5px;margin-bottom:14px;border:1px solid transparent;line-height:1.45}
.banner .ic{width:18px;height:18px;flex:none;margin-top:1px}
.banner.info{background:var(--azul-bg);border-color:#cdd9ee;color:#274d7a}
.banner.warn{background:var(--ambar-bg);border-color:#f0d8b0;color:#8a4b00}
.banner.gold{background:#faf3e0;border-color:#ecd9a6;color:#7a5e16}
.banner.bordo{background:#f7eae9;border-color:#eccfcc;color:var(--bordo-esc)}
.banner b{font-weight:700}
/* ---- Cobrança ---- */
.cob-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap;
  padding:14px 16px;background:var(--papel-2);border:1px solid var(--linha);border-radius:var(--r-sm);margin-bottom:14px}
.cob-metrics{display:flex;gap:18px}
.cob-metric{text-align:center;min-width:62px}
.cob-metric .cm-v{font-family:var(--serif);font-size:22px;font-weight:600;color:var(--bordo);line-height:1}
.cob-metric .cm-l{font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--tinta-3);margin-top:4px}
.cert-row{display:flex;gap:8px;flex-wrap:wrap}
.cob-hist{border-top:1px solid var(--linha);max-height:160px;overflow:auto}

/* ====== CALENDÁRIO FEDERAL ====== */
.cal-list{display:flex;flex-direction:column}
.cal-row{display:flex;align-items:center;gap:13px;padding:10px 2px;border-bottom:1px dashed var(--linha)}
.cal-row:last-child{border-bottom:none}
.cal-date{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--bordo);background:#f6e7e6;
  padding:5px 9px;border-radius:7px;min-width:78px;text-align:center;flex:none}
.cal-name{font-size:13px;font-weight:500}
.cal-tag{font-size:10.5px;color:var(--tinta-3);margin-top:1px}
.cal-when{margin-left:auto;font-size:11.5px;font-weight:600;color:var(--tinta-2);white-space:nowrap}
.cal-when.soon{color:var(--ambar)}

/* ====== GRÁFICOS ====== */
.donut-wrap{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.legend{display:flex;flex-direction:column;gap:9px;font-size:12.5px}
.legend .li{display:flex;align-items:center;gap:9px}
.legend .sw{width:12px;height:12px;border-radius:3px;flex:none}
.legend .li b{font-family:var(--serif);font-size:15px;margin-left:auto;padding-left:18px}
.bar-track{height:9px;border-radius:6px;background:var(--papel-2);overflow:hidden;margin-top:6px}
.bar-fill{height:100%;border-radius:6px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px}
.stat{background:var(--papel-2);border-radius:var(--r-sm);padding:13px 15px}
.stat .v{font-family:var(--serif);font-size:26px;font-weight:600;line-height:1}
.stat .l{font-size:11.5px;color:var(--tinta-2);margin-top:4px}

/* ====== TOAST ====== */
.toast-wrap{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:90;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--tinta);color:#f6f2eb;padding:11px 17px;border-radius:10px;box-shadow:var(--som-3);
  font-size:13px;font-weight:500;display:flex;align-items:center;gap:9px;animation:slideup .3s ease}
.toast.ok{background:#1c5234} .toast.err{background:#7a1f17}
.toast .ic{width:16px;height:16px}
@keyframes slideup{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* ====== UTIL ====== */
.muted{color:var(--tinta-2)} .small{font-size:12px}
.foot{display:flex;align-items:center;gap:16px;margin-top:20px;padding-top:16px;border-top:1px solid var(--linha);
  font-size:12px;color:var(--tinta-2);flex-wrap:wrap}
.foot .spacer{flex:1}
.link-btn{color:var(--bordo);font-weight:600;font-size:12px}
.link-btn:hover{text-decoration:underline}
.hidden{display:none!important}

/* ====== INTIMAÇÕES PJe ====== */
.intim-q{margin-bottom:16px}
.intim-q>label{display:block;font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:var(--tinta-3);font-weight:700;margin-bottom:8px}
.intim-opts{display:flex;flex-wrap:wrap;gap:8px}
.intim-opt{font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;padding:9px 15px;border-radius:9px;
  background:var(--papel-2);color:var(--tinta-2);border:1px solid var(--linha);transition:.15s}
.intim-opt:hover{border-color:var(--tinta-3);color:var(--tinta)}
.intim-opt.on{background:var(--bordo);color:#fff;border-color:var(--bordo-esc)}
.intim-res{margin-top:18px;padding:18px 16px;border-radius:var(--r);background:var(--papel-2);border:1px solid var(--linha);text-align:center}
.intim-res.empty{background:transparent;border-style:dashed}
.intim-res-lab{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--tinta-3);font-weight:700;margin-bottom:11px}
.intim-why{font-size:13px;color:var(--tinta-2);margin:12px auto 0;max-width:560px;line-height:1.55}
.dst{display:inline-flex;align-items:center;font-family:var(--serif);font-size:18px;font-weight:600;padding:7px 16px;border-radius:10px;line-height:1.2}
.dst.sm{font-family:inherit;font-size:12px;font-weight:700;padding:4px 10px;border-radius:7px}
.dst.djen{color:var(--azul);background:var(--azul-bg)}
.dst.dom{color:var(--verde);background:var(--verde-bg)}
.dst.sis{color:var(--ambar);background:var(--ambar-bg)}
.dst.man{color:var(--bordo);background:#f7eae9}
.dst.neu{color:var(--neutro);background:var(--neutro-bg);font-size:14px;font-weight:500;font-family:inherit}
.princ{display:flex;flex-direction:column;gap:13px}
.princ-row{display:flex;gap:12px;align-items:flex-start}
.princ-n{flex:none;width:24px;height:24px;border-radius:50%;background:var(--bordo);color:#fff;display:grid;place-items:center;font-size:12px;font-weight:700;font-family:var(--serif)}
.princ-t{font-weight:700;font-size:13.5px}
.princ-d{font-size:12.5px;color:var(--tinta-2);margin-top:2px;line-height:1.5}
.peg{margin-bottom:12px;padding:12px 14px;border-radius:10px;border:1px solid var(--linha);background:var(--carta)}
.peg-h{font-weight:700;font-size:13px;margin-bottom:5px}
.peg-h.pub{color:var(--verde)} .peg-h.priv{color:var(--azul)}
.peg p{font-size:12px;color:var(--tinta-2);line-height:1.55;margin:0}
.intim-note{display:flex;gap:9px;align-items:flex-start;margin-top:6px;padding:10px 12px;border-radius:9px;background:var(--azul-bg);border:1px solid #cdd9ee;font-size:12px;color:#274d7a}
.intim-note .ic{width:16px;height:16px;flex:none;margin-top:1px}

/* ---- Flip card (lógica × pegadinha) ---- */
.flip-card{perspective:1400px}
.flip-inner{position:relative;min-height:478px;transition:transform .55s cubic-bezier(.4,.1,.2,1);transform-style:preserve-3d}
.flip-inner.flipped{transform:rotateY(180deg)}
.flip-face{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--carta);
  border:1px solid var(--linha);border-radius:var(--r);box-shadow:var(--som);overflow:hidden;
  backface-visibility:hidden;-webkit-backface-visibility:hidden}
.flip-face .card-b{overflow:auto}
.flip-back{transform:rotateY(180deg)}
.flip-btn{margin-left:auto}
.flip-card .card-h{flex:none}

/* ---- Dúvidas ---- */
.duv-list{display:flex;flex-direction:column;gap:8px}
.duv-row{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1px solid var(--linha);border-radius:10px;background:var(--papel-2)}
.duv-row.done{opacity:.6}
.duv-row.done .duv-txt{text-decoration:line-through}
.duv-txt{flex:1;font-size:13.5px;line-height:1.45}
.duv-meta{font-size:11px;color:var(--tinta-3);margin-top:3px;text-decoration:none;display:block}

/* ---- Agenda de contatos ---- */
.cont-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.cont-card{background:var(--carta);border:1px solid var(--linha);border-radius:var(--r);padding:15px 16px;box-shadow:var(--som);position:relative;display:flex;flex-direction:column;gap:7px}
.cont-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.cont-nome{font-weight:700;font-size:14px;line-height:1.25}
.cont-org{font-size:11.5px;color:var(--tinta-2);margin-top:2px}
.tag-cat{flex:none;font-size:10px;font-weight:700;letter-spacing:.03em;padding:3px 8px;border-radius:6px;white-space:nowrap;
  color:var(--neutro);background:var(--neutro-bg);border:1px solid #ded5c7}
.tag-cat.trf3{color:var(--azul);background:var(--azul-bg);border-color:#cdd9ee}
.tag-cat.jfms{color:var(--verde);background:var(--verde-bg);border-color:#bfe0c8}
.tag-cat.tjms{color:var(--bordo);background:#f6e7e6;border-color:#ecccc9}
.tag-cat.comarca{color:var(--ambar);background:var(--ambar-bg);border-color:#f0d8b0}
.tag-cat.outro{color:var(--neutro);background:var(--neutro-bg);border-color:#ded5c7}
.cont-line{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--tinta);font-family:var(--mono)}
.cont-line .ic{width:15px;height:15px;color:var(--bordo);flex:none}
.cont-line:hover{color:var(--bordo)}
.cont-obs{font-size:12px;color:var(--tinta-2);line-height:1.5;border-top:1px dashed var(--linha);padding-top:8px;margin-top:2px}
.cont-acts{display:flex;gap:4px;justify-content:flex-end;margin-top:2px}

/* ---- Dúvidas (rodapé minimizável) ---- */
.duv-foot{border-top:1px solid var(--linha)}
.duv-toggle{width:100%;display:flex;align-items:center;gap:9px;padding:12px 18px;background:none;border:0;cursor:pointer;
  font-family:inherit;font-size:13px;font-weight:600;color:var(--tinta-2);text-align:left}
.duv-toggle:hover{color:var(--bordo)}
.duv-toggle .ic{width:16px;height:16px;flex:none}
.duv-count{margin-left:2px;font-size:11px;font-weight:700;color:var(--bordo);background:#f6e7e6;border:1px solid #ecccc9;border-radius:20px;padding:1px 8px}
.duv-chev{margin-left:auto;display:flex;transition:transform .25s}
.duv-chev .ic{width:18px;height:18px}
.duv-toggle.open .duv-chev{transform:rotate(180deg)}
.duv-body{max-height:0;overflow:hidden;transition:max-height .3s ease;padding:0 18px}
.duv-body.open{max-height:1200px;padding:0 18px 18px}

/* ---- Filtro por órgão ---- */
.orgfilter{display:flex;flex-wrap:wrap;gap:8px;margin:2px 0 16px}
.orgchip{display:inline-flex;align-items:center;gap:7px;font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer;
  padding:6px 13px;border-radius:20px;background:var(--papel-2);color:var(--tinta-2);border:1px solid var(--linha);transition:.15s}
.orgchip:hover{border-color:var(--tinta-3);color:var(--tinta)}
.orgchip.on{background:var(--bordo);color:#fff;border-color:var(--bordo-esc)}
.orgchip-n{font-size:10.5px;font-weight:700;padding:1px 7px;border-radius:20px;background:rgba(0,0,0,.07)}
.orgchip.on .orgchip-n{background:rgba(255,255,255,.22)}

/* ====== PRINT (peça art. 260) ====== */
@media print{
  body *{visibility:hidden}
  #printArea,#printArea *{visibility:visible}
  #printArea{position:absolute;inset:0;padding:42px 54px;background:#fff;color:#111}
}
#printArea{display:none}

/* ====== RESPONSIVO ====== */
@media(max-width:1100px){.kpis{grid-template-columns:repeat(3,1fr)}.grid-2{grid-template-columns:1fr}}
@media(max-width:860px){
  .topbar{padding:9px 14px;gap:10px}
  .subbar{top:60px;padding:9px 16px}
  .brand-txt{display:none}
  .btn.nova{padding:7px 11px;font-size:12px}
  .content{padding:18px 16px 50px}
  .kpis{grid-template-columns:1fr 1fr}
  .via-strip{gap:10px}.via-mini{min-width:150px}
  .row.c2,.row.c3{grid-template-columns:1fr}
  table{font-size:12px}td,thead th{padding:9px 9px}
}
@media(max-width:560px){.kpis{grid-template-columns:1fr 1fr}.via-mini{min-width:100%}}

/* ====== DEPLOY/GITHUB + STORAGE + OPERACIONAL ====== */
.op-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.op-tab{padding:7px 12px;border-radius:20px;border:1px solid var(--linha);background:var(--papel-2);font-size:12px;font-weight:700;color:var(--tinta-2);cursor:pointer}
.op-tab.on{background:var(--bordo);border-color:var(--bordo-esc);color:#fff}
.op-flow{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin:12px 0}
.op-step{background:var(--papel-2);border:1px solid var(--linha);border-radius:10px;padding:10px;font-size:12px}
.op-step b{display:block;color:var(--bordo);font-size:12.5px;margin-bottom:3px}
.op-docs{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin-top:12px}
.op-doc{background:#fffefb;border:1px solid var(--linha);border-radius:10px;padding:11px;font-size:12px}
.op-doc b{display:block;color:var(--tinta);margin-bottom:4px}
.storage-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px}
.storage-tile{border:1px solid var(--linha);background:var(--papel-2);border-radius:10px;padding:12px}
.storage-tile .v{font-family:var(--serif);font-size:24px;color:var(--bordo);font-weight:700;line-height:1}
.storage-tile .l{font-size:11.5px;color:var(--tinta-2);margin-top:4px}
.cont-card.fav{border-color:var(--ouro-clr);box-shadow:0 0 0 1px rgba(168,132,44,.18),var(--som-2)}
.favbtn{color:var(--tinta-3)}
.favbtn.on{color:var(--ouro);background:#fbf1d3;border-color:#ead8a1}
.meios-table{width:100%;border-collapse:collapse;margin-top:8px;background:var(--carta);border:1px solid var(--linha);border-radius:10px;overflow:hidden}
.meios-table th,.meios-table td{padding:7px;border-bottom:1px solid var(--linha);font-size:12px;vertical-align:middle}
.meios-table th{background:var(--papel-2);font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--tinta-3)}
.meios-table input,.meios-table select{width:100%;padding:6px 7px;border:1px solid var(--linha-2);border-radius:7px;background:#fff}
.proc-protocolado{display:block;margin-top:4px;font-family:var(--mono);font-size:11px;color:var(--azul);background:var(--azul-bg);border:1px solid #cdd9ee;border-radius:7px;padding:3px 6px;width:fit-content}

</style>
</head>

/* ---------- MOTOR DE DATAS E FERIADOS FORENSES ---------- */
const DOW=86400000;
function ymd(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function parseD(s){if(!s)return null;const [y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);}
function today(){const t=new Date();return new Date(t.getFullYear(),t.getMonth(),t.getDate());}
function fmtBR(s){const d=parseD(s);if(!d)return"—";return d.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric"});}
function fmtExt(d){return d.toLocaleDateString("pt-BR",{weekday:"long",day:"2-digit",month:"long",year:"numeric"});}
function diasEntre(a,b){return Math.round((parseD(b)-parseD(a))/DOW);}

// Páscoa (Meeus/Jones/Butcher) -> base p/ feriados móveis
function pascoa(y){const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),
  g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,
  m=Math.floor((a+11*h+22*l)/451),mes=Math.floor((h+l-7*m+114)/31),dia=((h+l-7*m+114)%31)+1;
  return new Date(y,mes-1,dia);}
function addDias(d,n){return new Date(d.getTime()+n*DOW);}

// Feriados nacionais + forenses federais (TRF3 / JF) para um ano
function feriados(y){
  const f={};
  const set=(d,nome,tag)=>{f[ymd(d)]={nome,tag};};
  const pas=pascoa(y);
  set(new Date(y,0,1),"Confraternização Universal","nacional");
  set(addDias(pas,-48),"Carnaval (segunda)","forense");
  set(addDias(pas,-47),"Carnaval (terça)","nacional");
  set(addDias(pas,-46),"Quarta-feira de Cinzas (até 14h)","forense");
  set(addDias(pas,-2),"Sexta-feira Santa","nacional");
  set(new Date(y,3,21),"Tiradentes","nacional");
  set(new Date(y,4,1),"Dia do Trabalho","nacional");
  set(addDias(pas,60),"Corpus Christi","forense");
  set(new Date(y,7,11),"Dia do Advogado / Criação dos Cursos Jurídicos","forense");
  set(new Date(y,8,7),"Independência","nacional");
  set(new Date(y,9,12),"Nossa Senhora Aparecida","nacional");
  set(new Date(y,9,28),"Dia do Servidor Público","forense");
  set(new Date(y,10,1),"Feriado regimental (1º/11)","forense");
  set(new Date(y,10,2),"Finados","nacional");
  set(new Date(y,10,15),"Proclamação da República","nacional");
  set(new Date(y,10,20),"Consciência Negra","nacional");
  set(new Date(y,11,8),"Dia da Justiça / Imaculada Conceição","forense");
  set(new Date(y,11,25),"Natal","nacional");
  // Recesso forense 20/12 a 06/01
  for(let dd=20;dd<=31;dd++) set(new Date(y,11,dd),"Recesso forense","recesso");
  for(let dd=1;dd<=6;dd++) set(new Date(y,0,dd),"Recesso forense","recesso");
  return f;
}
const _cacheFer={};
function ferDoAno(y){return _cacheFer[y]||(_cacheFer[y]=feriados(y));}
function ehFeriado(d){const m=ferDoAno(d.getFullYear());return m[ymd(d)];}
function ehUtil(d){const w=d.getDay();return w!==0&&w!==6&&!ehFeriado(d);}

// soma N dias úteis (pula fins de semana E feriados forenses)
function addDiasUteis(start,n){let d=new Date(start),c=0;while(c<n){d=addDias(d,1);if(ehUtil(d))c++;}return d;}
function addDiasCorridos(start,n){return addDias(new Date(start),n);}
// dias úteis restantes entre hoje e uma data (p/ suspensão art. 221)
function uteisAteData(de,ate){let d=new Date(de),c=0;const alvo=ymd(ate);
  if(ymd(d)>=alvo)return 0;
  while(ymd(d)<alvo){d=addDias(d,1);if(ehUtil(d))c++;}return c;}

/* ---------- CÁLCULO DE PRAZO (regras de negócio) ---------- */
// natureza pública/MP => prazo em dobro (modo "em dias")
function dobra(nat){return nat==="publica"||nat==="mp";}
function calcPrazo(c){
  if(c.prazoModo!=="dias")return c.prazo||null;
  const base=parseD(c.recebimento)||today();
  let n=Number(c.prazoDias)||0;
  if(dobra(c.naturezaParte)) n=n*2;          // REGRA 2: prazo em dobro
  const fim = c.prazoDiasTipo==="uteis" ? addDiasUteis(base,n) : addDiasCorridos(base,n);
  return ymd(fim);
}

/* ---------- INDICADORES ---------- */
function emTramitacao(c){return !CONCLUIDO.includes(c.status);}
function temPrazoCorrendo(c){return c.prazo && c.status!=="suspensa" && !(c.obstaculo&&c.obstaculo.ativo) && emTramitacao(c);}

/* ---------- RÉGUA DE COBRANÇA (tempo parado) ---------- */
function suspensoAgora(c){return c.status==="suspensa"||(c.obstaculo&&c.obstaculo.ativo);}
const NIVEL_LABEL={0:"Em curso",1:"Lembrete",2:"Reiteração",3:"Reiteração formal"};
// dias corridos em que a carta está parada aguardando cumprimento (desconta período suspenso)
function diasParado(c){
  if(!emTramitacao(c))return null;
  const base=parseD(c.recebimento)||parseD((c.criadoEm||"").slice(0,10))||today();
  let dias=Math.max(0,Math.round((today()-base)/DOW));
  dias-=Number(c.diasSuspensos||0);
  if(suspensoAgora(c)&&c.obstaculo&&c.obstaculo.desde){
    const atual=Math.max(0,Math.round((today()-parseD(c.obstaculo.desde))/DOW));
    dias-=atual;
  }
  return Math.max(0,dias);
}
// objeto-resumo da cobrança de uma carta
function cobranca(c){
  if(!emTramitacao(c))return null;
  const dias=diasParado(c);
  const INT=cobrancaIntervalo;
  const susp=suspensoAgora(c);
  const devidas=susp?Math.floor(dias/INT):Math.floor(dias/INT);
  const feitas=Number(c.reiteracoes||0);
  const pendentes=susp?0:Math.max(0,devidas-feitas);
  const nivel=devidas<=0?0:devidas===1?1:devidas===2?2:3;
  const proxMarco=(devidas+1)*INT;
  const faltam=susp?null:(pendentes>0?0:Math.max(0,proxMarco-dias));
  return {dias,INT,susp,devidas,feitas,pendentes,nivel,proxMarco,faltam};
}
// selo de tempo parado p/ tabelas
function seloParado(c){
  const cb=cobranca(c);
  if(!cb)return`<span class="selo neu">—</span>`;
  if(cb.susp)return`<span class="selo neu" title="Relógio suspenso">${cb.dias}d · susp.</span>`;
  if(cb.pendentes>0)return`<span class="selo venc" title="${cb.pendentes} cobrança(s) devida(s)">${cb.dias}d · cobrar</span>`;
  if(cb.faltam!=null&&cb.faltam<=5)return`<span class="selo amb" title="Cobrança em ${cb.faltam} dia(s)">${cb.dias}d</span>`;
  return`<span class="selo ok">${cb.dias}d</span>`;
}
function kpis(){
  const t=ymd(today());
  let tram=0,venc=0,vir=0,cump=0,cobDev=0;
  cartas.forEach(c=>{
    if(emTramitacao(c)) tram++;
    if(temPrazoCorrendo(c)){
      const d=diasEntre(t,c.prazo);
      if(d<=0) venc++; else if(d<=5) vir++;
    }
    if(c.status==="cumprida") cump++;
    const cb=cobranca(c); if(cb&&cb.pendentes>0) cobDev++;
  });
  return {tram,venc,vir,cump,cobDev};
}

/* ---------- SITUAÇÃO DE PRAZO (selo) ---------- */
function situacao(c){
  if(c.status==="cumprida")return{cls:"neu",txt:"Cumprida e devolvida"};
  if(c.status==="devolvida")return{cls:"neu",txt:"Baixada ao gabinete"};
  if(c.status==="arquivada")return{cls:"neu",txt:"Arquivada"};
  if(c.obstaculo&&c.obstaculo.ativo)return{cls:"neu",txt:"Suspensa (obstáculo)"};
  if(c.status==="suspensa")return{cls:"neu",txt:"Suspensa"};
  if(!c.prazo)return{cls:"neu",txt:"Sem prazo"};
  const d=diasEntre(ymd(today()),c.prazo);
  if(d<0)return{cls:"venc",txt:`Vencida há ${-d} ${-d===1?'dia':'dias'}`};
  if(d===0)return{cls:"hoje",txt:"Vence hoje"};
  if(d<=5)return{cls:"amb",txt:`Faltam ${d} ${d===1?'dia':'dias'}`};
  return{cls:"ok",txt:`Faltam ${d} dias`};
}

/* ---------- ORDENAÇÃO ---------- */
function ordenadas(list){
  const rank=c=>{
    if(c.status==="suspensa"||(c.obstaculo&&c.obstaculo.ativo))return 1;
    if(emTramitacao(c))return 0;
    return 2;
  };
  const key=c=>c.prazo?parseD(c.prazo).getTime():Infinity;
  return [...list].sort((a,b)=>{
    const ra=rank(a),rb=rank(b);
    if(ra!==rb)return ra-rb;
    if(ra===0)return key(a)-key(b);
    return (parseD(b.atualizadoEm.slice(0,10))||0)-(parseD(a.atualizadoEm.slice(0,10))||0);
  });
}

/* ---------- FILTRO ---------- */
function aplicaFiltro(){
  const q=filtro.q.trim().toLowerCase();
  return cartas.filter(c=>{
    if(filtro.tipo && c.tipo!==filtro.tipo)return false;
    if(filtro.status && c.status!==filtro.status)return false;
    if(filtro.cobranca){
      const cb=cobranca(c);
      if(filtro.cobranca==="devida" && !(cb&&cb.pendentes>0))return false;
      if(filtro.cobranca==="emdia" && !(cb&&!cb.susp&&cb.pendentes<=0))return false;
    }
    if(filtro.relator && c.relator!==filtro.relator)return false;
    if(filtro.divisao && c.divisao!==filtro.divisao)return false;
    if(filtro.prazo){
      const corr=temPrazoCorrendo(c);
      const d=c.prazo?diasEntre(ymd(today()),c.prazo):null;
      if(filtro.prazo==="venc" && !(corr&&d<=0))return false;
      if(filtro.prazo==="vir" && !(corr&&d>0&&d<=5))return false;
      if(filtro.prazo==="ok" && !(corr&&d>5))return false;
    }
    if(q){
      const blob=[c.processo,c.processoProtocolo,c.numeroCarta,c.origem,c.destino,c.finalidade,c.responsavel,
        STATUS[c.status],TIPOS[c.tipo],c.relator,NATUREZA[c.naturezaParte]].join(" ").toLowerCase();
      if(!blob.includes(q))return false;
    }
    return true;
  });
}

function calendarioFederal(){
  const t=today(); const lim=addDias(t,120);
  const itens=[];
  for(let y=t.getFullYear();y<=lim.getFullYear();y++){
    const m=ferDoAno(y);
    Object.keys(m).forEach(k=>{
      const d=parseD(k);
      if(d>=t && d<=lim) itens.push({d,...m[k]});
    });
  }
  // condensa recesso em uma faixa
  const recesso=itens.filter(i=>i.tag==="recesso").sort((a,b)=>a.d-b.d);
  const outros=itens.filter(i=>i.tag!=="recesso").sort((a,b)=>a.d-b.d);
  const linhas=[];
  if(recesso.length){
    const ini=recesso[0].d, fim=recesso[recesso.length-1].d;
    linhas.push({d:ini,nome:"Recesso forense",tag:"suspende a contagem de prazos",
      range:`${ini.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"})}–${fim.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"})}`});
  }
  outros.slice(0,8).forEach(i=>linhas.push({d:i.d,nome:i.nome,tag:i.tag==="forense"?"feriado forense":"feriado nacional"}));
  linhas.sort((a,b)=>a.d-b.d);
  if(!linhas.length)return`<p class="muted small">Sem feriados nos próximos 120 dias.</p>`;
  return `<div class="cal-list">${linhas.map(i=>{
    const dd=diasEntre(ymd(today()),ymd(i.d));
    const when=dd===0?"hoje":dd===1?"amanhã":`em ${dd} dias`;
    const soon=dd<=7?"soon":"";
    const dlabel=i.range||i.d.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"});
    return `<div class="cal-row">
      <div class="cal-date">${dlabel}</div>
      <div><div class="cal-name">${i.nome}</div><div class="cal-tag">${i.tag}</div></div>
      <div class="cal-when ${soon}">${when}</div>
    </div>`;
  }).join("")}</div>`;
}

function frenteUrgencia(){
  const urg=ordenadas(cartas.filter(temPrazoCorrendo)).filter(c=>{
    const d=diasEntre(ymd(today()),c.prazo);return d<=5;
  }).slice(0,6);
  const cob=ordenadas(cartas.filter(c=>{const cb=cobranca(c);return cb&&cb.pendentes>0;})).slice(0,6);
  if(!urg.length&&!cob.length)
    return `<div class="empty" style="padding:30px 10px"><div class="em-mark">${IC.check}</div><h3>Nada urgente</h3><p>Nenhuma carta vence nos próximos cinco dias e nada está parado além da régua de cobrança.</p></div>`;
  let h="";
  if(urg.length){
    h+=urg.map(c=>{
      const s=situacao(c);
      return `<div class="cal-row" onclick="App.openForm('${c.id}')" style="cursor:pointer">
        <span class="selo ${s.cls}">${s.txt}</span>
        <div style="flex:1"><div class="cal-name">${TIPOS[c.tipo]} · ${c.numeroCarta||c.processo}</div>
        <div class="cal-tag">${c.destino||"—"} · ${c.finalidade||"—"}</div></div>
        <span class="natureza ${c.naturezaParte}">${c.naturezaParte!=="privada"?IC.shield:""}${NATUREZA[c.naturezaParte]}</span>
      </div>`;
    }).join("");
  }
  if(cob.length){
    h+=`<div class="banner warn" style="margin-top:14px">${IC.bell}<div><b>${cob.length}</b> carta(s) parada(s) além da régua de ${cobrancaIntervalo} dias, com cobrança devida.</div></div>`;
    h+=cob.map(c=>{const cb=cobranca(c);
      return `<div class="cal-row" onclick="App.abrirComunicacoes('${c.id}',true)" style="cursor:pointer">
        <span class="selo venc">${cb.dias}d parada</span>
        <div style="flex:1"><div class="cal-name">${TIPOS[c.tipo]} · ${c.numeroCarta||c.processo}</div>
        <div class="cal-tag">${c.destino||"—"} · ${cb.pendentes} cobrança(s) em atraso</div></div>
        <span class="selo amb">${NIVEL_LABEL[cb.nivel]}</span>
      </div>`;}).join("");
  }
  return h;
}

function viaPill(c){
  const via=c.viaProtocolo||sugereVia(c)||"malote";
  const seq=ENC_STATUS[via]||ENC_STATUS.malote;
  let st=c.encaminhamentoStatus||c.diversoStatus||seq[0];
  if(!seq.includes(st)) st=seq[0];
  const done=["protocolado","enviado","recebido","aviso_juntado","decisao_incidente","encaminhado"].includes(st);
  const cls=st==="recebido"||st==="aviso_juntado"||st==="decisao_incidente"?"ok":done?"azul":"amb";
  const viaNome=(VIA[via]||via).split(" (")[0];
  return `<div class="viapill" onclick="event.stopPropagation();App.openProtocolo('${c.id}')" title="Registro de encaminhamentos — clique para editar via e estágio">
    <span class="vp-k">${esc(viaNome)}</span><span class="vp-s ${cls}">${esc(ENC_LABEL[st]||st)}</span></div>`;
}
function avancarDiverso(id){
  const c=cartas.find(x=>x.id===id);if(!c)return;
  const via=c.viaProtocolo||"malote";
  const seq=ENC_STATUS[via]||ENC_STATUS.malote;
  const atual=c.encaminhamentoStatus||seq[0];
  c.encaminhamentoStatus=seq[(seq.indexOf(atual)+1)%seq.length]||seq[0];
  c.diversoStatus=c.encaminhamentoStatus;
  c.atualizadoEm=new Date().toISOString();persist(false);renderList();
  toast("Fase: "+(ENC_LABEL[c.encaminhamentoStatus]||c.encaminhamentoStatus),"ok");
}

      else if(cb.faltam!=null&&cb.faltam<=5)seloP=`<span class="selo amb">${cb.dias} dias</span>`;
      else seloP=`<span class="selo ok">${cb.dias} dias</span>`;
      const prox=cb.susp?'<span class="muted small">relógio suspenso</span>':cb.pendentes>0?`<span style="color:var(--verm);font-weight:700">cobrar agora</span>`:`em ${cb.faltam} dia(s)`;
      return `<tr>
        <td><div style="font-weight:600">${c.numeroCarta||TIPOS[c.tipo]} <span class="tag-div ${c.divisao}">${c.divisao}</span></div><div class="cnj sub-cell">${c.processo}</div><div class="small muted">→ ${esc(c.destino||"—")}</div></td>
        <td>${seloP}</td>
        <td><div style="font-weight:700">${cb.feitas}</div>${cb.pendentes>0?`<div class="small" style="color:var(--verm);font-weight:600">${cb.pendentes} em atraso</div>`:`<div class="small muted">${NIVEL_LABEL[cb.nivel]}</div>`}</td>

        <td><button class="btn sm ${cb.pendentes>0?'primary':''}" onclick="App.abrirComunicacoes('${c.id}',true)">${IC.bell}Cobrar</button></td>
      </tr>`;
    }).join("")}
  </tbody></table>`;
}

function donut(parts,big,small){
  const tot=parts.reduce((s,p)=>s+p.v,0)||1;
  let acc=0;const R=52,C=2*Math.PI*R;
  const segs=parts.map(p=>{
    const frac=p.v/tot,len=frac*C,dash=`${len} ${C-len}`,off=-acc*C;acc+=frac;
    return `<circle cx="64" cy="64" r="${R}" fill="none" stroke="${p.c}" stroke-width="20" stroke-dasharray="${dash}" stroke-dashoffset="${off}" transform="rotate(-90 64 64)"/>`;
  }).join("");
  return `<svg viewBox="0 0 128 128" width="148" height="148">
    <circle cx="64" cy="64" r="${R}" fill="none" stroke="var(--papel-2)" stroke-width="20"/>${segs}
    <text x="64" y="60" text-anchor="middle" font-family="var(--serif)" font-size="26" font-weight="600" fill="var(--tinta)">${big}</text>
    <text x="64" y="78" text-anchor="middle" font-size="10" fill="var(--tinta-2)">${small}</text></svg>`;
}
function barRow(titulo,rows){
  const max=Math.max(1,...rows.map(r=>r[1]));
  return `<div class="section-title" style="font-size:13px">${titulo}</div>${rows.map(([l,v])=>`
    <div style="margin-bottom:9px"><div style="display:flex;justify-content:space-between;font-size:12.5px"><span>${l}</span><b>${v}</b></div>
    <div class="bar-track"><div class="bar-fill" style="width:${v/max*100}%;background:var(--bordo)"></div></div></div>`).join("")}`;
}

   INTIMAÇÕES PJe — para onde vai o expediente (regra CNJ / TRF3)
   ================================================================= */
const DESTINO={
  djen:{cls:"djen",nome:"DJEN",full:"Diário de Justiça Eletrônico Nacional — publicação"},
  dom:{cls:"dom",nome:"Domicílio Judicial Eletrônico",full:"Canal direto do CNJ"},
  sis:{cls:"sis",nome:"Sistema (PJe)",full:"Tratamento automático conforme o cadastro"},
  man:{cls:"man",nome:"Outro meio (manual)",full:"Carta, oficial de justiça — definido pelo servidor"}
};
// porta exata da regra do CNJ (tipo de pessoa × Domicílio × representação)
function intimDestino(tipo,hab,rep){
  if(!tipo||!hab||!rep)return null;
  if(tipo==="pub")
    return hab==="sim"
      ?{d:"dom",why:"Ente público habilitado: o Domicílio é o canal obrigatório."}
      :{d:"sis",why:"Situação não esperada — todo órgão público deve usar o Domicílio; o Sistema trata o caso."};
  if(tipo==="priv"){
    if(rep==="adv")return{d:"djen",why:"Há advogado constituído: intima-se por publicação no DJEN, habilitada ou não."};
    if(rep==="dpu")return{d:"man",why:"A DPU representa pessoas físicas. Para PJ privada, selecione advogado, procuradoria ou nenhum."};
    if(rep==="nada")return hab==="sim"
      ?{d:"dom",why:"Sem advogado e sem procuradoria, mas habilitada: vai direto pelo Domicílio."}
      :{d:"man",why:"Sem advogado, sem procuradoria e fora do Domicílio: o servidor define o meio."};
    return hab==="sim"
      ?{d:"dom",why:"Possui procuradoria e está habilitada (ex.: CEF): segue pelo Domicílio."}
      :{d:"sis",why:"Possui procuradoria mas fora do Domicílio: o Sistema trata automaticamente."};
  }
  // pessoa física
  if(rep==="adv")return{d:"djen",why:"Há advogado constituído: intima-se pelo DJEN, habilitada ou não."};
  if(rep==="dpu")return{d:"dom",why:"A DPU já é habilitada no Domicílio — a intimação vai para lá mesmo que a parte não esteja cadastrada."};
  if(rep==="proc")return{d:"dom",why:"Para pessoa física, a procuradoria é a DPU, que está no Domicílio."};
  return hab==="sim"
    ?{d:"dom",why:"Sem advogado e sem procuradoria, mas habilitada: vai pelo Domicílio."}
    :{d:"man",why:"Sem representação e fora do Domicílio: o servidor define outro meio."};
}

function intimGirar(){
  intimFlip=!intimFlip;
  const inner=document.querySelector(".flip-inner");
  if(inner)inner.classList.toggle("flipped",intimFlip);
}
function intimDuvToggle(){
  intimDuvOpen=!intimDuvOpen;
  const b=document.querySelector(".duv-body"),t=document.querySelector(".duv-toggle");
  if(b)b.classList.toggle("open",intimDuvOpen);
  if(t)t.classList.toggle("open",intimDuvOpen);
}
function addDuvida(){
  const inp=el("duvidaInput");const t=(inp.value||"").trim();
  if(!t){toast("Escreva a dúvida antes de adicionar.","err");return;}
  duvidas.push({id:uid(),texto:t,data:ymd(today()),resolvida:false});
  saveKey(DUVIDAS_KEY,duvidas);renderIntimacoes();
}
function toggleDuvida(id){
  const d=duvidas.find(x=>x.id===id);if(d)d.resolvida=!d.resolvida;
  saveKey(DUVIDAS_KEY,duvidas);renderIntimacoes();
}
function delDuvida(id){
  duvidas=duvidas.filter(x=>x.id!==id);saveKey(DUVIDAS_KEY,duvidas);renderIntimacoes();
}

function importarContatosOficiais(){
  const seed=seedContatos();
  const idx=new Map(contatos.map(c=>[(c.nome||"").trim(),c]));
  let add=0,upd=0;
  seed.forEach(s=>{
    const e=idx.get(s.nome);
    if(e){const a={categoria:s.categoria,telefone:s.telefone,email:s.email,orgao:s.orgao,obs:s.obs};
      if(JSON.stringify({categoria:e.categoria,telefone:e.telefone,email:e.email,orgao:e.orgao,obs:e.obs})!==JSON.stringify(a)){Object.assign(e,a);upd++;}}
    else{contatos.push(s);add++;}
  });
  if(!add&&!upd){toast("Os contatos oficiais já estão atualizados.","info");return;}
  saveKey(CONTATOS_KEY,contatos);renderContatos();
  toast(`${add} novo(s) e ${upd} atualizado(s).`,"ok");
}

  el("content").innerHTML=`

    <div class="toolbar">
      <div class="search">${IC.search}<input id="contQ" placeholder="Buscar por nome, órgão, telefone, e-mail…" value="${esc(filtroContato)}"></div>
      <button class="btn ghost" onclick="App.importarContatosOficiais()" title="Acrescentar os contatos oficiais (TRF3, JF-MS e TJMS) sem duplicar">${IC.contacts}Importar oficiais</button>

    </div>
    <div class="orgfilter">${chips}</div>
    <div id="contMount"></div>`;

function renderContatosList(){
  const q=filtroContato.trim().toLowerCase();
  const list=contatos.filter(c=>(!filtroOrgao||c.categoria===filtroOrgao) &&
    (!q||[c.nome,c.orgao,c.telefone,c.email,c.obs,CONT_CAT[c.categoria],...(c.meios||[]).map(m=>[m.tipo,m.valor,m.obs].join(" "))].join(" ").toLowerCase().includes(q)))
    .sort((a,b)=>(b.favorito===true)-(a.favorito===true)||String(a.nome||"").localeCompare(String(b.nome||"")));
  const mount=el("contMount");
  if(!contatos.length){mount.innerHTML=`<div class="tbl-wrap"><div class="empty"><div class="em-mark">${IC.contacts}</div><h3>Agenda vazia</h3><p>Adicione o primeiro contato ou clique em “Importar oficiais”.</p><div class="actions"><button class="btn primary" onclick="App.openContato()">${IC.plus}Novo contato</button></div></div></div>`;return;}
  if(!list.length){mount.innerHTML=`<div class="tbl-wrap"><div class="empty"><div class="em-mark">${IC.search}</div><h3>Nada encontrado</h3><p>Nenhum contato corresponde ao filtro.</p></div></div>`;return;}
  mount.innerHTML=`<div class="cont-grid">${list.map(contatoCard).join("")}</div>`;
}
function contatoCard(c){
  const meios=Array.isArray(c.meios)&&c.meios.length?c.meios:[...(c.telefone?[{tipo:"Telefone",valor:c.telefone,obs:""}]:[]),...(c.email?[{tipo:"E-mail",valor:c.email,obs:""}]:[])];
  const linhas=meios.slice(0,4).map(m=>{
    const val=esc(m.valor||"");
    const tipo=esc(m.tipo||"Meio");
    if((m.tipo||"").toLowerCase().includes("mail")) return `<a href="mailto:${val}" class="cont-line">${IC.mail}${tipo}: ${val}</a>`;
    if((m.tipo||"").toLowerCase().includes("telefone")) return `<a href="tel:${String(m.valor||"").replace(/[^0-9+]/g,"")}" class="cont-line">${IC.phone}${tipo}: ${val}</a>`;
    return `<div class="cont-line">${IC.send}${tipo}: ${val}</div>`;
  }).join("");
  return `<div class="cont-card ${c.favorito?'fav':''}">
    <div class="cont-top">
      <div><div class="cont-nome">${esc(c.nome)}</div>${c.orgao?`<div class="cont-org">${esc(c.orgao)}</div>`:""}</div>
      <span class="tag-cat ${c.categoria||'outro'}">${CONT_CAT[c.categoria]||"Outro"}</span>
    </div>
    ${linhas}
    ${c.obs?`<div class="cont-obs">${esc(c.obs)}</div>`:""}
    <div class="cont-acts">
      <button class="iconbtn favbtn ${c.favorito?'on':''}" title="Favoritar" onclick="App.toggleFavoritoContato('${c.id}')">★</button>
      <button class="iconbtn" title="Editar" onclick="App.openContato('${c.id}')">${IC.edit}</button>
      <button class="iconbtn danger" title="Excluir" onclick="App.excluirContato('${c.id}')">${IC.trash}</button>
    </div>
  </div>`;
}

function salvarContato(){

function excluirContato(id,fromModal){
  const c=contatos.find(x=>x.id===id);if(!c)return;

  contatos=contatos.filter(x=>x.id!==id);saveKey(CONTATOS_KEY,contatos);
  if(fromModal)closeModal();
  renderContatos();toast("Contato excluído.","ok");
}

let _modo="data";
function setModo(m){_modo=m;
  el("segData").classList.toggle("on",m==="data");
  el("segDias").classList.toggle("on",m==="dias");
  el("prazoData").classList.toggle("hidden",m==="dias");
  el("prazoDias").classList.toggle("hidden",m==="data");
  onPrazoCalc();
}
function onPrazoCalc(){
  const m=el("segDias").classList.contains("on")?"dias":"data";
  if(m!=="dias"){return;}
  const nat=el("f_natureza").value;
  const n0=Number(el("f_prazoDias").value)||0;
  const n=dobra(nat)?n0*2:n0;
  const tipo=el("f_prazoDiasTipo").value;
  const base=parseD(el("f_recebimento").value)||today();
  if(!n0){el("prazoCalcOut").textContent="";return;}
  const fim=tipo==="uteis"?addDiasUteis(base,n):addDiasCorridos(base,n);
  const dobraTxt=dobra(nat)?` (${n0} × 2 = ${n} dias, prazo em dobro)`:"";
  el("prazoCalcOut").textContent=`Vence em ${fmtExt(fim)}${dobraTxt}`;
}
function onNatureza(){
  const nat=el("f_natureza").value;
  el("natHelp").innerHTML=dobra(nat)
    ?`<span style="color:var(--ambar);font-weight:600">⚖ Prazo em dobro aplicado no modo “Em dias”.</span>`
    :`Parte particular — prazo simples.`;
  onPrazoCalc();
}
function toggleObstField(){el("obstWrap").classList.toggle("hidden",!el("f_obstAtivo").checked);}
function toggleComField(){el("comWrap").classList.toggle("hidden",!el("f_comFeita").checked);}

function checkSugestaoTipo(){
  const origem=(el("f_origem").value||"").toLowerCase();
  const destino=(el("f_destino").value||"").toLowerCase();
  const tipo=el("f_tipo").value;
  const isTRgMS=/turma regional|trgms|trf3|mato grosso do sul/.test(origem);
  const isVF3=/vara federal|jef/.test(destino);
  let banners="";
  // REGRA 4
  if(isTRgMS&&isVF3&&tipo!=="ordem"){
    banners+=`<div class="banner gold">${IC.info}<div>Origem na <b>TRgMS</b> e destino em <b>Vara Federal da 3ª Região</b>: o caso costuma ser <b>Carta de Ordem</b>.
      <button class="link-btn" onclick="document.getElementById('f_tipo').value='ordem';App.checkSugestaoTipo();App.onPrazoCalc();">Aplicar tipo “Carta de Ordem”</button></div></div>`;
  }
  // REGRA 3
  if(tipo==="rogatoria"){
    const okPres=/presidente/.test(origem);
    banners+=`<div class="banner ${okPres?'info':'warn'}">${IC.scale}<div><b>Carta Rogatória:</b> somente o <b>Presidente do Tribunal</b> é competente para assiná-la. ${okPres?"Origem compatível.":"Ajuste o juízo de origem para “Presidente do Tribunal” antes de salvar."}</div></div>`;
  }
  el("formBanners").innerHTML=banners;
}

function coletaForm(){
  const g=id=>el(id).value.trim();
  const obstAtivo=el("f_obstAtivo").checked;
  const comFeita=el("f_comFeita").checked;
  return {
    tipo:el("f_tipo").value,status:el("f_status").value,divisao:el("f_divisao").value,
    processo:g("f_processo"),processoProtocolo:g("f_processoProtocolo"),numeroCarta:g("f_numeroCarta"),relator:el("f_relator").value,
    responsavel:g("f_responsavel"),origem:g("f_origem"),destino:g("f_destino"),
    emailDestino:g("f_emailDestino"),finalidade:g("f_finalidade"),
    naturezaParte:el("f_natureza").value,viaProtocolo:el("f_via").value,
    recebimento:el("f_recebimento").value,
    prazoModo:el("segDias").classList.contains("on")?"dias":"data",
    prazo:el("f_prazo").value,prazoDias:g("f_prazoDias"),prazoDiasTipo:el("f_prazoDiasTipo").value,
    obstaculo:{ativo:obstAtivo,motivo:g("f_obstMotivo")},
    comunicacao:{feita:comFeita,meio:g("f_comMeio"),data:el("f_comData").value,hora:g("f_comHora"),servidor:g("f_comServidor")},
    observacoes:el("f_observacoes").value
  };
}

function salvar(){
  const d=coletaForm();
  // validação base
  let erro=[];
  if(!d.processo) erro.push("f_processo");
  if(!d.origem) erro.push("f_origem");
  const temPrazo = d.prazoModo==="data" ? !!d.prazo : !!Number(d.prazoDias);
  if(!temPrazo) erro.push(d.prazoModo==="data"?"f_prazo":"f_prazoDias");
  $$(".field").forEach(f=>f.classList.remove("err"));
  if(erro.length){
    erro.forEach(idf=>el(idf).closest(".field")?.classList.add("err"));
    toast("Preencha os campos obrigatórios destacados.","err");return;
  }
  // REGRA 3 — rogatória exige Presidente
  if(d.tipo==="rogatoria" && !/presidente/i.test(d.origem)){
    el("f_origem").closest(".field").classList.add("err");
    toast("Carta Rogatória só pode ser assinada pelo Presidente do Tribunal — ajuste o juízo de origem.","err");return;
  }

  const prev=editingId?cartas.find(x=>x.id===editingId):null;
  const c=prev?{...prev}:{id:uid(),criadoEm:new Date().toISOString(),checklist:{acordao:false,certidao:false,procuracoes:false,despacho:false,mandato:false},reiteracoes:0};
  Object.assign(c,d);
  c.atualizadoEm=new Date().toISOString();
  c.checklist=c.checklist||{acordao:false,certidao:false,procuracoes:false,despacho:false,mandato:false};
  c.reiteracoes=c.reiteracoes||0;

  // obstáculo: gerencia suspensão do saldo (art. 221)
  const eraAtivo=prev&&prev.obstaculo&&prev.obstaculo.ativo;
  if(d.obstaculo.ativo && !eraAtivo){
    // ativando agora: guarda saldo de dias úteis até o prazo
    const saldo=c.prazo?uteisAteData(today(),parseD(c.prazo)):0;
    c.obstaculo={ativo:true,motivo:d.obstaculo.motivo,desde:ymd(today()),restantes:saldo};
  }else if(!d.obstaculo.ativo && eraAtivo){
    // desativando: recoloca o saldo a partir de hoje e contabiliza o período parado em suspensão
    const saldo=(prev.obstaculo&&prev.obstaculo.restantes)||0;
    if(prev.obstaculo&&prev.obstaculo.desde){
      const susDias=Math.max(0,Math.round((today()-parseD(prev.obstaculo.desde))/DOW));
      c.diasSuspensos=Number(prev.diasSuspensos||0)+susDias;
    }
    c.prazo=ymd(addDiasUteis(today(),saldo));
    c.prazoModo="data";
    c.obstaculo={ativo:false,motivo:"",desde:"",restantes:0};
  }else if(d.obstaculo.ativo && eraAtivo){
    c.obstaculo={...prev.obstaculo,motivo:d.obstaculo.motivo};
  }else{
    c.obstaculo={ativo:false,motivo:"",desde:"",restantes:0};
  }

  // recalcula prazo se modo dias (e não está em obstáculo)
  if(!c.obstaculo.ativo){
    c.prazo=calcPrazo(c);
    if(c.prazoModo==="data") c.prazo=d.prazo;
  }

  // Retorno: marcada como cumprida e devolvida → registra a data do retorno (estatística)
  const eraCump=prev&&prev.status==="cumprida";
  if(c.status==="cumprida" && !eraCump){
    c.cumpridaEm=ymd(today());
  }
  if(c.status!=="cumprida"){c.cumpridaEm=c.status==="devolvida"?(prev&&prev.cumpridaEm)||"":"";}
  c.devolverAte="";

  if(prev){const i=cartas.findIndex(x=>x.id===prev.id);cartas[i]=c;}
  else cartas.unshift(c);
  persist();
  closeModal();
  toast(prev?"Carta atualizada.":"Carta cadastrada.","ok");
}

/* ---------- IMPORTAÇÃO DE PDF ---------- */
function bindDropzone(){
  const dz=el("dropz"),inp=el("pdfInput");
  if(!dz)return;
  inp.addEventListener("change",e=>{if(e.target.files[0])importarPDF(e.target.files[0]);});
  ["dragenter","dragover"].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.add("drag");}));
  ["dragleave","drop"].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.remove("drag");}));
  dz.addEventListener("drop",e=>{const f=e.dataTransfer.files[0];if(f&&f.type==="application/pdf")importarPDF(f);});
}
function dropMsg(txt,cls){const s=el("dropStatus");if(!s)return;s.className="status show "+cls;s.textContent=txt;}
async function importarPDF(file){
  if(!window.pdfjsLib){dropMsg("Biblioteca de leitura indisponível (sem conexão).","err");return;}
  dropMsg("Lendo o PDF…","busy");
  try{
    pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    const buf=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    let texto="";
    for(let p=1;p<=pdf.numPages;p++){const pg=await pdf.getPage(p);const tc=await pg.getTextContent();texto+=tc.items.map(i=>i.str).join(" ")+"\n";}
    if(texto.replace(/\s/g,"").length<20){dropMsg("PDF sem texto pesquisável (documento digitalizado não é lido).","err");return;}
    aplicaExtracao(texto);
    dropMsg("Dados extraídos e preenchidos. Confira antes de salvar.","ok");
  }catch(e){dropMsg("Não foi possível ler o PDF.","err");}
}
function aplicaExtracao(t){
  const set=(idf,val)=>{if(val&&el(idf)&&!el(idf).value)el(idf).value=val;};
  const cnj=(t.match(/\d{7}-\d{2}\.\d{4}\.\d\.\d{2}\.\d{4}/)||[])[0];
  set("f_processo",cnj);
  if(/carta de ordem/i.test(t))el("f_tipo").value="ordem";
  else if(/carta rogat/i.test(t))el("f_tipo").value="rogatoria";
  else if(/carta precat/i.test(t))el("f_tipo").value="precatoria";
  // origem fixada na Turma
  set("f_origem","Turma Regional de Mato Grosso do Sul — TRF3");
  const fin=(t.match(/finalidade[:\s]+([^\n.]{4,80})/i)||[])[1];
  set("f_finalidade",fin&&fin.trim());
  const dest=(t.match(/(?:deprecad[oa]|destino|ju[íi]zo deprecado)[:\s]+([^\n.]{4,80})/i)||[])[1];
  set("f_destino",dest&&dest.trim());
  const relator=(t.match(/relator[a]?[:\s]+([^\n.]{4,60})/i)||[])[1];
  if(relator){const r=RELATORES.find(x=>relator.toLowerCase().includes(x.toLowerCase().slice(0,8)));if(r)el("f_relator").value=r;}
  // prazo em dias
  const pdias=(t.match(/prazo[:\s]+(?:de\s+)?(\d{1,3})\s*dias/i)||[])[1];
  if(pdias){setModo("dias");el("f_prazoDias").value=pdias;onPrazoCalc();}
  // compila no observações
  const compila=[];
  const parte=(t.match(/(?:parte|requerente|exequente)[:\s]+([^\n.]{4,70})/i)||[])[1];
  if(parte)compila.push("Parte: "+parte.trim());
  if(relator)compila.push("Relator: "+relator.trim());
  const ender=(t.match(/(?:endere[çc]o)[:\s]+([^\n]{6,90})/i)||[])[1];
  if(ender)compila.push("Endereço: "+ender.trim());
  const idDec=(t.match(/(?:id|identificador)[:\s]+(\d{6,})/i)||[])[1];
  if(idDec)compila.push("ID da decisão: "+idDec);
  if(compila.length){const ta=el("f_observacoes");ta.value=(ta.value?ta.value+"\n":"")+"— Importado do PDF —\n"+compila.join("\n");}
  checkSugestaoTipo();
}

/* ---------- GERADOR DE .DOCX (OOXML montado no navegador, sem dependências) ---------- */
function crc32(bytes){
  if(!crc32.t){const t=crc32.t=[];for(let n=0;n<256;n++){let c=n;for(let k=0;k<8;k++)c=c&1?0xEDB88320^(c>>>1):c>>>1;t[n]=c>>>0;}}
  const t=crc32.t;let crc=0xFFFFFFFF;
  for(let i=0;i<bytes.length;i++)crc=t[(crc^bytes[i])&0xFF]^(crc>>>8);
  return (crc^0xFFFFFFFF)>>>0;
}
function zipStore(files){
  const enc=new TextEncoder();
  const u16=n=>[n&255,(n>>8)&255], u32=n=>[n&255,(n>>8)&255,(n>>16)&255,(n>>24)&255];
  const locals=[],central=[];let offset=0;
  files.forEach(f=>{
    const name=enc.encode(f.name),data=f.bytes,crc=crc32(data);
    const lh=[].concat(u32(0x04034b50),u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(data.length),u32(data.length),u16(name.length),u16(0));
    const local=new Uint8Array(lh.length+name.length+data.length);
    local.set(lh,0);local.set(name,lh.length);local.set(data,lh.length+name.length);
    locals.push(local);
    const ch=[].concat(u32(0x02014b50),u16(20),u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(data.length),u32(data.length),u16(name.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(offset));
    const cent=new Uint8Array(ch.length+name.length);
    cent.set(ch,0);cent.set(name,ch.length);
    central.push(cent);offset+=local.length;
  });
  const cdSize=central.reduce((a,c)=>a+c.length,0),cdOffset=offset;
  const eocd=new Uint8Array([].concat(u32(0x06054b50),u16(0),u16(0),u16(files.length),u16(files.length),u32(cdSize),u32(cdOffset),u16(0)));
  const total=locals.reduce((a,c)=>a+c.length,0)+cdSize+eocd.length;
  const out=new Uint8Array(total);let p=0;
  locals.forEach(c=>{out.set(c,p);p+=c.length;});
  central.forEach(c=>{out.set(c,p);p+=c.length;});
  out.set(eocd,p);return out;
}
function dRun(t,r){r=r||{};let rp="";
  if(r.b)rp+="<w:b/>";if(r.i)rp+="<w:i/>";if(r.caps)rp+="<w:caps/>";
  rp+=`<w:rFonts w:ascii="${r.font||"Times New Roman"}" w:hAnsi="${r.font||"Times New Roman"}"/>`;
  if(r.sz)rp+=`<w:sz w:val="${r.sz}"/><w:szCs w:val="${r.sz}"/>`;
  if(r.color)rp+=`<w:color w:val="${r.color}"/>`;
  if(r.cs)rp+=`<w:spacing w:val="${r.cs}"/>`;
  return `<w:r><w:rPr>${rp}</w:rPr><w:t xml:space="preserve">${esc(t)}</w:t></w:r>`;
}
function dPar(runs,p){p=p||{};let pp="";
  if(p.jc)pp+=`<w:jc w:val="${p.jc}"/>`;
  pp+=`<w:spacing${p.line?` w:line="${p.line}" w:lineRule="auto"`:""} w:before="${p.before||0}" w:after="${p.after!=null?p.after:160}"/>`;
  if(p.bdr)pp+=`<w:pBdr><w:bottom w:val="single" w:sz="12" w:space="6" w:color="6B1F2A"/></w:pBdr>`;
  return `<w:p><w:pPr>${pp}</w:pPr>${Array.isArray(runs)?runs.join(""):runs}</w:p>`;
}
function padronizaQualDoc(qualAtual){
  const q=(qualAtual??"").toString().trim().toLowerCase();
  if(["decurso","permanencia","permanência","reiteracao","reiteração"].includes(q))return"certidoes";
  if(["certidao","certidão","certidoes","certidões"].includes(q))return"certidoes";
  if(["comunicacao","comunicação","comunicacoes","comunicações"].includes(q))return"comunicacoes";
  if(["relatorio","relatório","relatorios","relatórios"].includes(q))return"relatorios";
  if(["outro","outros"].includes(q))return"outros";
  return"outros";
}
function montarObjectPathDocx(carta_id,qual,nome_arquivo_docx){
  const cId=(carta_id??"").toString().trim();
  const q=padronizaQualDoc(qual);
  const raw=(nome_arquivo_docx??"documento.docx").toString().trim()||"documento.docx";
  const n=raw.toLowerCase().endsWith(".docx")?raw:`${raw}.docx`;
  return`docx/${cId}/${q}/${n}`;
}
async function uploadAnexoDocx(carta_id,qualAtual,blob,nome_arquivo_docx){
  const supa=window.deprecataSupabase || supabase;
  if(!supa)throw new Error("Supabase client não inicializado. Configure deprecata:supabase:url e deprecata:supabase:anon no localStorage.");
  const bucket="deprecata-anexos";
  const qual=padronizaQualDoc(qualAtual);
  const object_path=montarObjectPathDocx(carta_id,qual,nome_arquivo_docx);
  const fileLike=blob instanceof File ? blob : new File([blob],nome_arquivo_docx,{type:"application/vnd.openxmlformats-officedocument.wordprocessingml.document"});
  const {error:storageError}=await supa.storage.from(bucket).upload(object_path,fileLike,{upsert:true,contentType:fileLike.type});
  if(storageError)throw storageError;
  const payload={
    carta_id,
    qual,
    object_path,
    tipo_arquivo:"docx",
    size_bytes:Number(fileLike.size??0),
    nome_arquivo:nome_arquivo_docx,
    criado_em:new Date().toISOString()
  };
  const {error:insertError}=await supa.from("carta_anexos").insert(payload);
  if(insertError)throw insertError;
  return{object_path,qual,nome_arquivo:nome_arquivo_docx,size_bytes:payload.size_bytes};
}
function baixarDocx(nomeArquivo,bodyXml){
  const enc=new TextEncoder();
  const ct=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/></Types>`;
  const rels=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/></Relationships>`;
  const doc=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:body>${bodyXml}<w:sectPr><w:pgSz w:w="11906" w:h="16838"/><w:pgMar w:top="1418" w:right="1418" w:bottom="1418" w:left="1701" w:header="709" w:footer="709" w:gutter="0"/></w:sectPr></w:body></w:document>`;
  const zip=zipStore([
    {name:"[Content_Types].xml",bytes:enc.encode(ct)},
    {name:"_rels/.rels",bytes:enc.encode(rels)},
    {name:"word/document.xml",bytes:enc.encode(doc)}
  ]);
  const blob=new Blob([zip],{type:"application/vnd.openxmlformats-officedocument.wordprocessingml.document"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=nomeArquivo;
  document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},1500);
  return blob;
}
function gerarCertidao(id,qual){
  const c=cartas.find(x=>x.id===id);
  const dias=diasParado(c);
  const ref=`${TIPOS[c.tipo].toLowerCase()} nº ${c.numeroCarta||"(s/nº)"}, autos nº ${c.processo}`;
  let titulo,corpo;
  if(qual==="decurso"){
    titulo="Certidão de decurso de prazo";
    corpo=`Certifico, para os devidos fins, que decorreu o prazo assinalado para cumprimento da ${ref}${c.prazo?`, fixado para ${fmtBR(c.prazo)}`:""}, sem que tenha havido, até a presente data, notícia de cumprimento ou a devolução dos autos pelo juízo deprecado (${c.destino||"—"}). O referido é verdade e dou fé.`;
  }else if(qual==="permanencia"){
    titulo="Certidão de permanência";
    corpo=`Certifico, para os devidos fins, que a ${ref} permanece aguardando cumprimento perante o juízo deprecado (${c.destino||"—"}) há ${dias!=null?dias:"—"} dias corridos, contados de seu recebimento em ${fmtBR(c.recebimento)}, tendo sido reiterada ${c.reiteracoes||0} vez(es) até esta data. O referido é verdade e dou fé.`;
  }else{
    titulo="Certidão de reiteração";
    corpo=`Certifico, para os devidos fins, que nesta data foi reiterado ao juízo deprecado (${c.destino||"—"}), pela via ${VIA[c.viaProtocolo].split(" (")[0].toLowerCase()}, o pedido de cumprimento da ${ref}, com a finalidade de ${c.finalidade||"diligência"}. Lavro a presente como ato ordinatório (art. 152, VI, do CPC). O referido é verdade e dou fé.`;
  }
  const body=[
    dPar([dRun("Tribunal Regional Federal da 3ª Região",{b:true,sz:18,color:"6B1F2A",caps:true,cs:24})],{jc:"center",after:20}),
    dPar([dRun("Turma Regional de Mato Grosso do Sul",{b:true,sz:26})],{jc:"center",after:20}),
    dPar([dRun("Subsecretaria · Divisão de Triagem e Cumprimento — DKMS",{sz:18,color:"555555"})],{jc:"center",after:300,bdr:true}),
    dPar([dRun(titulo,{b:true,sz:28,color:"6B1F2A",caps:true,cs:20})],{jc:"center",after:360}),
    dPar([dRun(corpo,{sz:24})],{jc:"both",line:360,after:560}),
    dPar([dRun(fmtExt(today()),{sz:23})],{jc:"center",after:680}),
    dPar([dRun("______________________________________",{sz:23})],{jc:"center",after:40}),
    dPar([dRun("Servidor(a) responsável — DKMS / TRgMS",{sz:22,color:"444444"})],{jc:"center",after:0})
  ].join("");
  const ref2=(c.numeroCarta||c.processo||"carta").replace(/[^\w.-]+/g,"-");
  const qualNome=(qual||"certidao").toString().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^\w.-]+/g,"-").toLowerCase();
  const nome_arquivo_docx=`Certidao_${qualNome}_${ref2}.docx`;
  const blob=baixarDocx(nome_arquivo_docx,body);
  uploadAnexoDocx(id,qual,blob,nome_arquivo_docx)
    .then(()=>toast("DOCX baixado e anexado no Supabase ✅","ok"))
    .catch(e=>{
      console.error(e);
      toast("Certidão .docx baixada. Supabase não anexou/registrou; veja console ou configure as chaves.","err");
    });
}
